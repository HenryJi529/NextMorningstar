spring:
  mail:
    host: ${morningstar.email.host}
    port: ${morningstar.email.port}
    username: ${MAIL_SERVER_ACCOUNT}
    password: ${MAIL_SERVER_TOKEN} # 客户端授权码
    default-encoding: utf-8
    properties:
      mail:
        debug: ${morningstar.email.debug} # NOTE: 这里已经用`PrintUtil.suppressSystemOut`隐藏了debug
        smtp:
          ssl:
            enable: ${morningstar.email.ssl}
          connectiontimeout: 5000 # 连接超时
          timeout: 5000           # 发送超时
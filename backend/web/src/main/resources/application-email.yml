spring:
  mail:
    host: smtp.qq.com
    port: 465
    username: ${MAIL_SERVER_ACCOUNT}
    password: ${MAIL_SERVER_TOKEN} # 客户端授权码
    default-encoding: utf-8
    properties:
      mail:
        smtp:
          socketFactory:
            class: javax.net.ssl.SSLSocketFactory # SSL连接配置
morningstar:
  mail:
    admin: ${MAIL_ADMIN_ACCOUNT}
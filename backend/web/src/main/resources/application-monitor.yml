management:
  endpoints:
    web:
      exposure:
        include: '*'
  endpoint:
    health:
      show-details: always
      show-components: always # 显示各健康检查组件详情
    shutdown:
      access: unrestricted # 启用 shutdown 端点（POST /actuator/shutdown）
  info:
    env:
      enabled: true  # 3.x 默认关闭，显式开启环境信息
    java:
      enabled: true  # 显示 JVM 信息
    os:
      enabled: true  # 显示操作系统信息
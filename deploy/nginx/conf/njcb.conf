server {
    listen 80;
    server_name njcb-union-prototype.morningstar369.com;
    root /opt/njcb-union-prototype;

    location /admin {
        try_files /admin.html =404;
    }
    
    location /member-pc {
        try_files /member-pc.html =404;
    }

    location /member-mobile {
        try_files /member-mobile.html =404;
    }
}


server {
    listen 80;
    server_name njcb-union-pc.morningstar369.com;
    charset utf-8;

    location ^~ /api/docs/ {
        return 404;
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:8123;
        rewrite ^/api/(.*)$ /$1 break;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        root /etc/nginx/www/njcb-union/pc/;
        try_files $uri $uri/ /index.html;
    }
}


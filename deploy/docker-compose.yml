volumes:
  redis_data: 
    external: true
    name: ${PROJECT_NAME}_redis_data
  mysql_data: 
    external: true
    name: ${PROJECT_NAME}_mysql_data
  mongodb_db: 
    external: true
    name: ${PROJECT_NAME}_mongodb_db
  mongodb_configdb: 
    external: true
    name: ${PROJECT_NAME}_mongodb_configdb
  rabbitmq_data: 
    external: true
    name: ${PROJECT_NAME}_rabbitmq_data
  certbot_etc: 
    external: true
    name: ${PROJECT_NAME}_certbot_etc
  certbot_lib: 
    external: true
    name: ${PROJECT_NAME}_certbot_lib
  certbot_webroot: 
    external: true
    name: ${PROJECT_NAME}_certbot_webroot
  es_data: 
    external: true
    name: ${PROJECT_NAME}_es_data
  es_logs: 
    external: true
    name: ${PROJECT_NAME}_es_logs
  jellyfin_cache: 
    external: true
    name: ${PROJECT_NAME}_jellyfin_cache
  jellyfin_config: 
    external: true
    name: ${PROJECT_NAME}_jellyfin_config
  jellyfin_media: 
    external: true
    name: ${PROJECT_NAME}_jellyfin_media
  ftpd_data: 
    external: true
    name: ${PROJECT_NAME}_ftpd_data
  ftpd_logs: 
    external: true
    name: ${PROJECT_NAME}_ftpd_logs
  sftpd_data: 
    external: true
    name: ${PROJECT_NAME}_sftpd_data
  springboot_logs: 
    external: true
    name: ${PROJECT_NAME}_springboot_logs
  neo4j_data: 
    external: true
    name: ${PROJECT_NAME}_neo4j_data
  neo4j_logs: 
    external: true
    name: ${PROJECT_NAME}_neo4j_logs
  neo4j_import: 
    external: true
    name: ${PROJECT_NAME}_neo4j_import
  neo4j_plugins: 
    external: true
    name: ${PROJECT_NAME}_neo4j_plugins

networks:
  website:
    driver: bridge

services:
  redis:
    image: valkey/valkey:7
    container_name: ${PROJECT_NAME}_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - 6379:6379
    command: valkey-server --bind 0.0.0.0 --protected-mode no --requirepass ${REDIS_PASSWORD} --loglevel warning
    environment:
      - VALKEY_EXTRA_FLAGS=--maxmemory 256mb --maxmemory-policy volatile-lfu
    networks:
      - website
  nginx:
    image: nginx:1.27.3
    container_name: ${PROJECT_NAME}_nginx
    restart: unless-stopped
    volumes:
      - ./nginx/conf:/etc/nginx/conf.d
      - ./nginx/www:/etc/nginx/www
      - certbot_etc:/etc/letsencrypt
      - certbot_webroot:/var/www/html
      - /home/${CLOUD_USERNAME}/smart-union-hub/prototype:/opt/smart-union-hub-prototype
    network_mode: host
  certbot:
    image: certbot/certbot
    container_name: ${PROJECT_NAME}_certbot
    restart: unless-stopped
    volumes:
      - certbot_webroot:/var/www/html
      - certbot_etc:/etc/letsencrypt
      - certbot_lib:/var/lib/letsencrypt
    tty: true
    entrypoint: ["/bin/sh", "-c", "tail -f /dev/null"]
    network_mode: host
  mysql:
    image: mysql:9
    container_name: ${PROJECT_NAME}_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - 3306:3306
    networks:
      - website
  mongodb:
    image: mongo:8
    restart: unless-stopped
    container_name: ${PROJECT_NAME}_mongodb
    ports:
      - 27017:27017
    volumes:
      - mongodb_db:/data/db
      - mongodb_configdb:/data/configdb
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    networks:
      - website
  rabbitmq:
    container_name: ${PROJECT_NAME}_rabbitmq
    build:
      context: .
      dockerfile: rabbitmq/Dockerfile
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: root
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - 15672:15672 # 管理监控端口
      # - 15671:15671 # 管理监控端口(HTTPS)
      - 5672:5672 # 程序与mq交互的访问端口
      - 61613:61613 # STOMP
    networks:
      - website
  es:
    container_name: ${PROJECT_NAME}_es
    build:
      context: .
      dockerfile: elasticsearch/Dockerfile
    privileged: true
    restart: unless-stopped
    ulimits:
      memlock: # 允许进程锁定物理内存
        soft: -1
        hard: -1
    environment:
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m" # 固定JVM堆内存
      - bootstrap.memory_lock=true # 禁用Swap
      # - "network.host=0.0.0.0" # 全局网络
      # - "http.host=0.0.0.0" # ​​HTTP REST API​​
      # - "transport.host=0.0.0.0" # 节点间通信
      - "discovery.type=single-node" # 单节点模式
      - action.destructive_requires_name=true # 防止误删索引
      - action.auto_create_index=false # 防止自动创建索引
    volumes:
      - es_data:/usr/share/elasticsearch/data
      - es_logs:/usr/share/elasticsearch/logs
    ports:
      - "127.0.0.1:9200:9200"
      - 9300:9300  # 心跳检查端口
    networks:
      - website
  sshwifty:
    image: niruix/sshwifty:0.3.25-beta-release
    container_name: ${PROJECT_NAME}_sshwifty
    restart: unless-stopped
    ports:
      - 8182:8182
  jellyfin:
    image: jellyfin/jellyfin
    container_name: ${PROJECT_NAME}_jellyfin
    volumes:
      - jellyfin_cache:/cache
      - jellyfin_config:/config
      - jellyfin_media:/media
    restart: unless-stopped
    ports:
      - 8096:8096
    environment:
      - JELLYFIN_PublishedServerUrl=${JELLYFIN_URL}
  springboot:
    container_name: ${PROJECT_NAME}_springboot
    build:
      context: .
      dockerfile: springboot/Dockerfile
    # command: bash -c "while true; do sleep 3600; done"
    tty: true
    ports:
      - 8091:8091
    volumes:
      - springboot_logs:/app/logs
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      MONGO_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
    depends_on:
      - es
      - mysql
      - redis
      - mongodb
      - rabbitmq
      - neo4j
    networks:
      - website
  frps:
    image: snowdreamtech/frps
    container_name: ${PROJECT_NAME}_frps
    working_dir: /root
    restart: unless-stopped
    environment:
      - FRPS_PASSWORD=${FRPS_PASSWORD}
      - FRPS_TOKEN=${FRPS_TOKEN}
    volumes:
      - ./frp/config:/etc/frp
    network_mode: "host"
  ftpd: # 只用于公开一些文件
    image: fauria/vsftpd
    container_name: ${PROJECT_NAME}_ftpd
    restart: unless-stopped
    volumes:
      - ftpd_data:/home/vsftpd
      - ftpd_logs:/var/log/vsftpd
    environment:
      - FTP_USER=ftp
      - FTP_PASS=1234asdw
      # - PASV_ADDRESS=${CLOUD_DOMAIN} # NOTE: cyberduck 客户端支持使用域名
      - PASV_ADDRESS=${CLOUD_IP} # NOTE: python ftplib 只支持ip
      - PASV_MIN_PORT=21100
      - PASV_MAX_PORT=21110
    ports:
      - 20:20
      - 21:21
      - 21100-21110:21100-21110
  sftpd:
    image: atmoz/sftp
    container_name: ${PROJECT_NAME}_sftpd
    restart: unless-stopped
    volumes:
      - sftpd_data:/home/sftp/upload
    ports:
      - 1122:22
    environment:
      - SFTP_USERS=sftp:${SFTP_PASSWORD}:1001
  neo4j:
    image: neo4j:latest
    container_name: ${PROJECT_NAME}_neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_connector_bolt_advertised__address=localhost:7687
      - NEO4J_dbms_connector_http_advertised__address=:7474
      - NEO4J_dbms_security_auth__minimum__password__length=8
      - NEO4J_dbms_security_auth__enabled=true
    restart: unless-stopped
    networks:
      - website
